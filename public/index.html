<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <style>
      /* ── Global mobile resets ── */
      *, *::before, *::after { box-sizing: border-box; }
      body { overflow-x: hidden; -webkit-text-size-adjust: 100%; }
      /* Prevent iOS auto-zoom on inputs by ensuring font-size >= 16px at the OS level */
      input, textarea, select { font-size: max(16px, 1em); }

      /* ── Responsive utility classes ── */
      @media (max-width: 640px) {
        .resp-page-pad  { padding: 20px 16px !important; }
        .resp-grid-1col { grid-template-columns: 1fr !important; }
        .resp-grid-2col { grid-template-columns: 1fr 1fr !important; }
        .resp-hide-sm   { display: none !important; }
        .resp-stack     { flex-direction: column !important; }
        .resp-full-w    { width: 100% !important; min-width: 0 !important; }
      }
      @media (max-width: 900px) {
        .resp-page-pad  { padding: 24px 20px !important; }
        .resp-grid-1col { grid-template-columns: 1fr !important; }
      }

      /* Smooth scrolling on mobile */
      html { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }

      /* Safe area insets for notched phones */
      .nav-safe { padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
    </style>
    <meta name="theme-color" content="#f97316" />

    <!-- ── Primary SEO ── -->
    <title>HackForge – AI-Powered Capture The Flag & Cybersecurity Training Platform</title>
    <meta name="description" content="CTF With AI (ctfWithAi) is an AI-powered Capture The Flag platform. Generate vulnerable labs instantly with AI, practice real hacking, web exploitation, and start your bug bounty journey today." />
    <meta name="keywords" content="ctf with ai, ctfwithai, capture the flag with ai, AI generated labs, AI CTF, create labs instantly, capture the flag instantly, bug bounty with ai, generate vulnerable labs with ai, cybersecurity training, hacking labs, web exploitation, AI pentesting" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.ctfwithai.com/" />

    <!-- ── Open Graph (Facebook / LinkedIn) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.ctfwithai.com/" />
    <meta property="og:title" content="CTF With AI – AI-Powered Capture The Flag Platform" />
    <meta property="og:description" content="Generate vulnerable hacking labs instantly with AI. Practice real CTF challenges, web exploitation, and start your bug bounty journey on ctfWithAi." />
    <meta property="og:image" content="https://www.ctfwithai.com/og-image.png" />
    <meta property="og:site_name" content="ctfWithAi" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CTF With AI – AI-Powered Hacking Labs" />
    <meta name="twitter:description" content="Generate vulnerable labs with AI. Capture the flag instantly. Start your bug bounty journey with ctfWithAi." />
    <meta name="twitter:image" content="https://www.ctfwithai.com/og-image.png" />

    <!-- ── Structured Data: WebSite (enables Sitelinks Search Box) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ctfWithAi",
      "alternateName": ["CTF With AI", "ctf with ai", "CTFWithAI"],
      "url": "https://www.ctfwithai.com",
      "description": "AI-powered Capture The Flag and cybersecurity training platform. Generate vulnerable labs instantly.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.ctfwithai.com/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ── Structured Data: SiteNavigationElement (helps Google show sitelinks) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "ctfWithAi Navigation",
      "itemListElement": [
        {
          "@type": "SiteNavigationElement",
          "position": 1,
          "name": "Login",
          "description": "Sign in to your ctfWithAi account",
          "url": "https://www.ctfwithai.com/login"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 2,
          "name": "Register",
          "description": "Create a free ctfWithAi account",
          "url": "https://www.ctfwithai.com/Register"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 3,
          "name": "Features",
          "description": "AI-generated vulnerable labs and CTF challenges",
          "url": "https://www.ctfwithai.com/#features"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 4,
          "name": "Vision",
          "description": "Our vision for AI-powered cybersecurity training",
          "url": "https://www.ctfwithai.com/#vision"
        }
      ]
    }
    </script>

    <!-- ── Structured Data: Organization ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ctfWithAi",
      "alternateName": "CTF With AI",
      "url": "https://www.ctfwithai.com",
      "logo": "https://www.ctfwithai.com/logo.png",
      "description": "AI-powered Capture The Flag platform for cybersecurity training, bug bounty practice, and AI-generated vulnerable labs.",
      "sameAs": [
        "https://www.linkedin.com/company/vulnforge/"
      ]
    }
    </script>

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run ctfWithAi – AI-Powered Capture The Flag Platform.</noscript>
    <div id="root"></div>
  </body>
</html>
